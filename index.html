<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EOR | AI Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar (Visible on Desktop, Removed on Mobile) -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <i class="fa-solid fa-wand-magic-sparkles"></i> EOR
            </div>
            <div class="context-panel">
                <div class="context-title"><i class="fa-solid fa-brain"></i> Active Context</div>
                <div class="context-chips">
                    <div class="chip">WebLLM</div>
                    <div class="chip">Memory: 20</div>
                    <div class="chip">Max Tokens: 2048</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" id="nav-workspace">Workspace</button>
                <button class="nav-item" id="nav-reset">New Session</button>
                <button class="nav-item" id="nav-theme">
                    <i class="fa-solid fa-moon"></i> Toggle Theme
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-pill" id="status-pill">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">System Offline</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-viewport" id="chat-viewport">
                <div class="chat-container" id="chat-list">
                    <div class="message-row eor">
                        <div class="message-content welcome-banner">
                            <h2>Welcome to <strong>EOR Workspace</strong></h2>
                            <p>
                                System Updated.<br>
                                • Long responses enabled (2048 tokens).<br>
                                • Memory holds last 20 messages.<br>
                                • Mobile Menu Removed for cleaner UI.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-dock-wrapper">
                <div class="assist-toolbar">
                    <button class="assist-btn universal-btn" id="assist-btn" title="AI Assist">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI Assist
                    </button>
                </div>
                <div class="input-dock">
                    <textarea id="msg-input" rows="1" placeholder="Type anything here..."></textarea>
                    <button id="send-btn" class="send-btn" aria-label="Send Message">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="loader-overlay" id="loader-overlay">
        <i class="fa-solid fa-microchip loader-icon"></i>
        <h2 class="modal-title">Initializing AI</h2>
        <p class="modal-desc">Loading Model via WebLLM...<br>Please wait.</p>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="log-text" id="loader-log">Waiting...</div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
