<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EOR | AI Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Load the AI Inference Library (Transformers.js) -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        
        // Allow the worker to access the library if needed, 
        // or we will import it directly inside the worker (recommended).
        window.TransormersLib = { pipeline, env };
    </script>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <button class="mobile-menu-btn" onclick="ui.toggleMobileMenu()" id="menu-btn">
        <i class="fa-solid fa-bars" id="menu-icon" style="color: #475569; font-size: 1.2rem;"></i>
    </button>

    <div class="mobile-backdrop" id="mobile-backdrop" onclick="ui.toggleMobileMenu()"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <i class="fa-solid fa-wand-magic-sparkles"></i> EOR
            </div>
            <div class="context-panel">
                <div class="context-title"><i class="fa-solid fa-brain"></i> Active Context</div>
                <div class="context-chips">
                    <div class="chip">Presentation</div>
                    <div class="chip">Research</div>
                    <div class="chip">Coding</div>
                </div>
            </div>
            <button class="nav-item active" onclick="ui.closeMobileMenu()">Workspace</button>
            <button class="nav-item" onclick="app.reset(); ui.closeMobileMenu()">New Session</button>
            <div class="sidebar-footer">
                <div class="status-pill" onclick="engine.init(); ui.closeMobileMenu();">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">System Offline</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-viewport" id="chat-viewport">
                <div class="chat-container" id="chat-list">
                    <div class="message-row">
                        <div class="message-content">
                            <h2 style="margin-bottom: 10px; color: var(--text-dark);">Welcome to <strong>EOR Workspace</strong></h2>
                            <p style="color: var(--text-gray); line-height: 1.6;">
                                System Ready. Files will be stored in <strong>eor_storage</strong>.<br>
                                • Initializing Local AI...<br>
                                • Type a message to start.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="input-dock-wrapper">
                <div class="assist-toolbar">
                    <button class="assist-btn universal-btn" onclick="app.assist('universal')" title="AI Assist">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI Assist
                    </button>
                </div>
                <div class="input-dock">
                    <textarea id="msg-input" rows="1" placeholder="Type anything here..." 
                        oninput="ui.resize(this); app.detectCode(this)" 
                        onkeydown="app.handleEnter(event)"></textarea>
                    <button id="send-btn" class="send-btn" onclick="app.send()" disabled aria-label="Send Message">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div class="loader-overlay" id="loader-overlay">
        <i class="fa-solid fa-microchip loader-icon"></i>
        <h2 class="modal-title">Initializing AI Engine</h2>
        <p class="modal-desc">Accessing <strong>eor_storage</strong>.<br>Loading GGUF Model into Memory...</p>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="log-text" id="loader-log">Waiting...</div>
    </div>

    <div id="download-area" style="display:none;"></div>

    <!-- Main Script -->
    <script type="module" src="script.js"></script>
</body>
</html>
